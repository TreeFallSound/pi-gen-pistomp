# Reusable build workflow — called by .github/workflows/build-<pkg>.yml
#
# Usage in a per-package workflow:
#
#   name: build-jack2-pistomp
#   on:
#     push:
#       branches: [main]
#       paths: ['debpkgs/jack2-pistomp/**', 'config.sh']
#     pull_request:
#       paths: ['debpkgs/jack2-pistomp/**', 'config.sh']
#     workflow_dispatch:
#   jobs:
#     build:
#       uses: ./.github/workflows/build-deb.yml
#       with:
#         pkg: jack2-pistomp
#       secrets: inherit

name: build-deb

on:
  workflow_call:
    inputs:
      pkg:
        required: true
        type: string
      custom_build_deps:
        description: Comma-separated custom pistomp packages in Build-Depends that aren't in apt repos (e.g. "lg"). Downloaded from GitHub Releases before dpkg-checkbuilddeps runs.
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            ca-certificates curl wget jq gnupg dpkg-dev devscripts debhelper-compat

      - name: Extract version
        id: version
        run: |
          source config.sh
          PKG="${{ inputs.pkg }}"
          # Try changelog first (dpkg-buildpackage packages), then config.sh pins
          if [ -f "debpkgs/${PKG}/debian/changelog" ]; then
            VERSION=$(dpkg-parsechangelog --show-field Version \
              --file "debpkgs/${PKG}/debian/changelog")
          else
            # Binary-only packages: version is in debian/control
            VERSION=$(grep '^Version:' "debpkgs/${PKG}/debian/control" | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check version not already published (PR only)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/debpkg/${{ inputs.pkg }}/${{ steps.version.outputs.version }}")
          if [ "$STATUS" = "200" ]; then
            echo "ERROR: version ${{ steps.version.outputs.version }} is already published." >&2
            echo "Bump the version in debpkgs/${{ inputs.pkg }}/debian/changelog" >&2
            echo "(or config.sh for pinned packages)." >&2
            exit 1
          fi
          echo "Version ${{ steps.version.outputs.version }} is new, OK."

      - name: Install custom build deps from Releases
        if: inputs.custom_build_deps != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra CUSTOM_PKGS <<< "${{ inputs.custom_build_deps }}"
          mkdir -p ${{ github.workspace }}/cache
          for DEP in "${CUSTOM_PKGS[@]}"; do
            DEP="${DEP// /}"  # strip whitespace
            [ -z "$DEP" ] && continue
            if dpkg -s "$DEP" >/dev/null 2>&1; then
              echo "$DEP already installed"
              continue
            fi
            echo "==> Downloading $DEP.deb from GitHub Releases..."
            ASSET_URL=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
              | jq -r --arg p "$DEP" \
                '.[] | select(.tag_name | startswith("debpkg/" + $p + "/")) | .assets[].browser_download_url' \
              | grep "/${DEP}_.*_arm64\.deb$" | head -1)
            if [ -z "$ASSET_URL" ]; then
              echo "ERROR: $DEP.deb not found in GitHub Releases." >&2
              echo "Publish $DEP first." >&2
              exit 1
            fi
            wget -q -P ${{ github.workspace }}/cache "$ASSET_URL"
            dpkg -i ${{ github.workspace }}/cache/${DEP}_*_arm64.deb
            apt-get install -f -y -qq
          done

      - name: Install build dependencies
        run: |
          PKG="${{ inputs.pkg }}"
          CONTROL="debpkgs/${PKG}/debian/control"
          if [ ! -f "$CONTROL" ]; then
            echo "No debian/control (binary-only package), skipping build-deps"
            exit 0
          fi
          # apt-get build-dep parses Build-Depends from debian/control natively,
          # stripping version constraints and resolving alternatives.
          # Custom pistomp packages already installed (via custom_build_deps
          # step or build.sh) are satisfied; apt skips them.
          cd "debpkgs/${PKG}"
          apt-get build-dep -y -q .

      - name: Build .deb
        run: |
          source config.sh
          WORKDIR=/tmp CACHE_DIR=${{ github.workspace }}/cache \
            bash debpkgs/${{ inputs.pkg }}/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.pkg }}-deb
          path: cache/*.deb
          if-no-files-found: error

      - name: Publish to GitHub Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debpkg/${{ inputs.pkg }}/${{ steps.version.outputs.version }}
          name: "${{ inputs.pkg }} ${{ steps.version.outputs.version }}"
          files: cache/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}