name: build-cabsim-lv2

on:
  push:
    branches: [main]
    paths:
      - 'debpkgs/cabsim-lv2/**'
      - 'config.sh'
  pull_request:
    paths:
      - 'debpkgs/cabsim-lv2/**'
      - 'config.sh'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-deb.yml
    with:
      pkg: cabsim-lv2
    secrets: inherit
