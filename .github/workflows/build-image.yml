name: build-image

# Builds the full pistompOS SD-card image.
#
# Triggers ONLY on:
#   - a pushed tag matching `release/<version>` (e.g. release/3.0.0) — produces
#     a GitHub Release with the image attached, named pistompOS-<version>.img.xz
#   - manual dispatch — produces a workflow artifact only (no release)
#
# Per-package OTA releases (tagged debpkg/<pkg>/<ver>) do NOT trigger this
# workflow, so shipping a .deb no longer rebuilds the whole image.
on:
  workflow_dispatch:
  push:
    tags:
      - 'release/*'

jobs:
  build:
    # Native arm64 runner: the build runs in an arm64 container, so no QEMU /
    # binfmt cross-arch shim is needed (build-docker.sh skips it on aarch64).
    runs-on: ubuntu-24.04-arm
    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
    - name: Clean Workspace Folder
      run: |
        rm -rf ./* || true
        rm -rf ./.??* || true

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        clean: true

    - name: Determine image version
      id: version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/release/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/release/}"
        else
          VERSION="dev-$(git rev-parse --short HEAD)"
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Image version: ${VERSION}"

    # Gate: the image installs custom packages from the published apt repo, so a
    # package whose upstream has moved past its last release would silently ship
    # stale. Fail the build (exit 2) until the missing .deb release is cut.
    # WARN states (no release / no sidecar yet) are non-fatal and pass through.
    - name: Staleness gate (fail on STALE)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./scripts/check-upstream-staleness.sh

    - name: Run build-docker.sh
      env:
        IMG_VERSION: ${{ steps.version.outputs.version }}
      run: ./build-docker.sh

    - name: Compress image
      run: ./compress-img.sh

    - name: Generate Imager 2.x JSON manifest
      run: |
        XZ_FILE=$(ls deploy/*pistompOS*.img.xz | head -1)
        ./scripts/generate-imager-manifest.sh "$XZ_FILE" "${{ steps.version.outputs.version }}"

    - name: List output files
      run: ls -lh deploy pistomp-imager-manifest.json

    - name: Upload built image
      uses: actions/upload-artifact@v4
      with:
        name: pistompOS
        path: ./deploy/*pistompOS*.img.xz
        compression-level: 6
        if-no-files-found: error

    - name: Upload Imager manifest
      uses: actions/upload-artifact@v4
      with:
        name: imager-manifest
        path: ./pistomp-imager-manifest.json
        if-no-files-found: error

    - name: Upload debug artifacts
      uses: actions/upload-artifact@v4
      with:
        name: debug-files
        path: |
          ./deploy/*pistompOS*.info
          ./deploy/*build*.log
        compression-level: 6
        if-no-files-found: error

  release:
    # Only publish a Release for `release/<version>` tag pushes, never for
    # manual dispatch (whose github.ref is a branch).
    if: startsWith(github.ref, 'refs/tags/release/')
    needs: [build]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pistompOS
          path: release-assets/
      - uses: actions/download-artifact@v4
        with:
          name: imager-manifest
          path: release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-manifest:
    # Deploy the Imager manifest to gh-pages so the latest version is always
    # available at https://treefallsound.github.io/pi-gen-pistomp/imager/pistomp.json
    if: startsWith(github.ref, 'refs/tags/release/')
    needs: [build]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          name: imager-manifest
          path: imager/
      - name: Version-pin and deploy
        run: |
          cp imager/pistomp-imager-manifest.json imager/pistomp.json
          cp imager/pistomp-imager-manifest.json "imager/pistomp-${{ needs.build.outputs.image_version }}.json"
          git config user.name "pistomp-bot"
          git config user.email "bot@treefallsound.com"
          git add imager/
          if git diff --cached --quiet; then
            echo "No changes to gh-pages."
          else
            git commit -m "deploy imager manifest for ${{ needs.build.outputs.image_version }} [skip ci]"
            git push
          fi
