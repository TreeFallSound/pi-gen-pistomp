name: publish-apt-repo

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-apt-repo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout gh-pages (or seed empty orphan)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          # Ensure reprepro config exists (idempotent).
          # Written with printf (not a heredoc) so the lines can be indented
          # to keep the YAML block scalar valid while the generated file has
          # no leading whitespace (Debian control format treats leading
          # whitespace as a field continuation).
          # Two suites: 'trixie' is the production channel every device
          # follows; 'trixie-testing' receives pre-releases (GitHub Releases
          # with prerelease:true, i.e. Debian '~' versions) and is only in
          # sources.list on test devices.
          mkdir -p conf
          printf '%s\n' \
            "Origin: pistomp" \
            "Label: pistomp" \
            "Suite: trixie" \
            "Codename: trixie" \
            "Architectures: arm64" \
            "Components: main" \
            "Description: pi-Stomp custom packages" \
            "" \
            "Origin: pistomp" \
            "Label: pistomp" \
            "Suite: trixie-testing" \
            "Codename: trixie-testing" \
            "Architectures: arm64" \
            "Components: main" \
            "Description: pi-Stomp custom packages (pre-release channel)" \
            > conf/distributions
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add conf/distributions .nojekyll
          git commit -m "apt: bootstrap reprepro config" || true

      - name: Install reprepro
        run: sudo apt-get update -qq && sudo apt-get install -y -qq reprepro

      - name: Download all .deb release assets
        working-directory: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Route each release's assets by its prerelease flag: stable
          # releases feed the 'trixie' suite, pre-releases 'trixie-testing'.
          # REST API returns full release objects with .prerelease and
          # .assets[].browser_download_url. Paginate to cover all releases
          # (100 per page is the max); stop on the first empty page (a page
          # of releases with no .deb assets is not the end of the list).
          mkdir -p incoming/stable incoming/testing
          PAGE=1
          while :; do
            RESP=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100&page=${PAGE}")
            if [ "$(echo "$RESP" | jq 'length')" = "0" ]; then
              break
            fi
            echo "$RESP" | jq -r '
              .[]
              | (if .prerelease then "testing" else "stable" end) as $channel
              | .assets[].browser_download_url
              | select(test("_(arm64|all)\\.deb$"))
              | "\($channel) \(.)"' \
            | while read -r CHANNEL URL; do
                wget -q -P "incoming/${CHANNEL}/" "$URL"
              done
            PAGE=$((PAGE + 1))
          done

      - name: Add packages to repo (refuses duplicate name+version)
        working-directory: repo
        run: |
          shopt -s nullglob
          for deb in incoming/stable/*.deb; do
            reprepro -b . includedeb trixie "$deb" || {
              echo "::warning::reprepro refused $deb (duplicate name+version, or missing Section/Priority in debian/control)."
            }
          done
          for deb in incoming/testing/*.deb; do
            reprepro -b . includedeb trixie-testing "$deb" || {
              echo "::warning::reprepro refused $deb (duplicate name+version, or missing Section/Priority in debian/control)."
            }
          done

      - name: Commit and push
        working-directory: repo
        run: |
          git add -A pool/ dists/ conf/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — repo is already up to date."
            exit 0
          fi
          git commit -m "apt: rebuild index $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages