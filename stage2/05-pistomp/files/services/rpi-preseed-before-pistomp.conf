# rpi-preseed refuses to reconfigure UID 1000 while anything is running as it
# (it is about to change that user's name, password and groups). Upstream enforces
# this by ordering itself before every *login* surface — getty, systemd-user-sessions,
# user@.service, display-manager — which is sufficient on stock Raspberry Pi OS, where
# UID 1000 is only ever a human.
#
# On pi-Stomp, UID 1000 (pistomp) is also the service account for the audio stack.
# Those units are WantedBy=multi-user.target with no relation to rpi-preseed, so
# systemd is free to start them concurrently with it — and does. The result is that
# rpi-preseed's ExecStartPre pgrep finds a live UID 1000, aborts, and no Imager
# customization is ever applied.
#
# Order rpi-preseed ahead of every unit that runs as pistomp. Ordering only, never
# Requires=/Wants= — a preseed failure must not take the audio stack down with it.
#
# Keep this list in sync with the units that declare User=pistomp:
#   grep -l '^User=pistomp' /usr/lib/systemd/system/*.service
[Unit]
Before=browsepy.service
Before=mod-amidithru.service
Before=mod-host.service
Before=mod-ui.service
Before=mod-ala-pi-stomp.service
Before=pi-stomp-jackbridge.service
Before=pistomp-recovery.service
