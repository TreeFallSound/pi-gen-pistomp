# Don't let sshd serve the shared factory host key before it has been replaced,
# or the first client to connect pins a key that is about to change and every
# later connection trips the MITM warning.
#
# Wants=, never Requires=: if regeneration fails we still want sshd up on the
# factory key. Unreachable is a worse failure than a shared key -- there is no
# console on this hardware. Same rule as 10-before-pistomp.conf.
[Unit]
Wants=regenerate-ssh-host-keys.service
After=regenerate-ssh-host-keys.service
