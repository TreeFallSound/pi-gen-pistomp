# pi-stomp: clear any rfkill soft-block before bluetoothd powers the adapter.
# On Pi 5 the BCM4345 BT can come up soft-blocked; without unblocking, the
# controller can't power on and BLE MIDI ALSA ports never appear. Self-gating:
# only runs when bluetooth.service runs, i.e. when BLUETOOTH_ENABLED turned it on.
# The leading '-' keeps a missing/again-blocked radio non-fatal.
[Service]
ExecStartPre=-/usr/sbin/rfkill unblock bluetooth
