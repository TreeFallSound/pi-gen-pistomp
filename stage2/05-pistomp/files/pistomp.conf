# pistomp.conf — User configuration
# Edit this file on the boot partition after flashing.
# Settings are applied on first boot; this file is left in place.
# To apply changes, delete /boot/firmware/firstboot.done and reboot.

# WiFi (leave blank to skip)
WIFI_SSID=""
WIFI_PASSWORD=""
WIFI_COUNTRY="US"

# Hostname
HOSTNAME="pistomp"

# User login via SSH
USER_PASSWORD="pistomp"
SSH_AUTHORIZED_KEY=""

# Timezone (e.g. Europe/London, America/New_York)
TIMEZONE="US/Central"

# JACK/netJACK audio settings
JACK_SAMPLE_RATE="48000"
JACK_PERIOD=""            # defaults to 128 on Pi 5, 256 elsewhere
JACK_NPERIODS="2"         # lower nperiods -> lower latency -> more xruns
JACK_PORT_MAX=""          # defaults to 512 on Pi 5, 256 elsewhere
JACK_RTPRIO="75"          # not worth changing
JACK_DEVICE="hw:0"        # change if you want to use an external USB audio interface instead of onboard
JACK_EXTRA_ARGS=""
JACK_DRIVER_ARGS=""

# rpi5 only; 3/4 share bt with UART
BLUETOOTH_ENABLED="false"
