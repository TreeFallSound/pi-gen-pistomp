# /etc/default/rtirq — pi-Stomp realtime IRQ tuning
#
# Applied by rtirq.service at boot. Only effective with threadirqs
# (on cmdline) or PREEMPT_RT kernel.

# IRQ thread service names (space separated, highest to lowest priority).
#   Pi 3/4: snd_soc_iqaudio_codec — matched by the "snd" wildcard.
#   Pi 5:   dw_axi_dmac_platform — the RP1 DMA controller. The IQAudio
#           DAC+ is fed through RP1 DMA, and the IRQ thread is named after
#           the controller, NOT the sound driver.
# "snd-usb" covers USB audio/MIDI interfaces; it sits last because the
# onboard DAC is the realtime path on every shipped board.
#
# Only one of "snd" / "dw_axi_dmac_platform" matches on any given board, so
# ordering them first and second means the onboard audio IRQ lands at 90 or
# 89 regardless of which board this boots on.
#
# grep -c . /proc/interrupts; ps -eo rtprio,comm | grep irq/
RTIRQ_NAME_LIST="snd dw_axi_dmac_platform snd-usb"

# Highest priority assigned to the first name in the list.
RTIRQ_PRIO_HIGH=90

# Priority decrease step between each subsequent name.
RTIRQ_PRIO_DECR=1

# Lowest priority floor.
RTIRQ_PRIO_LOW=51

# Whether to reset all IRQ threads to SCHED_OTHER first.
RTIRQ_RESET_ALL=0

# On kernel configurations that support it, which services should
# NOT be threaded. Empty — we want everything threaded (threadirqs
# on cmdline handles this).
RTIRQ_NON_THREADED=""

# Process names forced to highest realtime priority range (99-91).
# Unset — timer IRQ is already high priority by default.
#RTIRQ_HIGH_LIST="timer"