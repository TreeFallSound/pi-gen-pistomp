# Audio/realtime performance tuning for pistompOS
# Applied at boot via /etc/sysctl.d/

# Minimize swap usage to reduce page fault stalls, but keep it as safety valve
# (swappiness=1 means "only swap to prevent OOM", vs default 60)
vm.swappiness=1

# Cap dirty page writeback to prevent large SD card flush stalls.
# Defaults 20/10 would let 100MB+ accumulate on a 512MB system, blocking
# all I/O for seconds when the kernel forces a synchronous flush.
# 3/1 caps it at ~15MB/5MB — smaller, more frequent flushes
vm.dirty_ratio=3
vm.dirty_background_ratio=1

# Favor keeping filesystem metadata (dentries, inodes) hot over page cache.
# Helps mod-ui serve static files and mod-host load LV2 plugins without
# re-reading directory structures from the SD card
vm.vfs_cache_pressure=50

# Keep timers on their originating CPU instead of migrating to idle cores.
# Prevents cross-core wakeup noise from hitting the core running JACK
kernel.timer_migration=0

# Increase inotify watches for file monitoring (mod-ui, browsepy)
fs.inotify.max_user_watches=600000
